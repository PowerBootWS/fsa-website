  <script>
    (function () {
      var btn = document.getElementById('hamburger');
      var menu = document.getElementById('mobile-menu');
      if (!btn || !menu) return;
      function openMenu() { btn.classList.add('is-open'); menu.classList.add('is-open'); btn.setAttribute('aria-expanded', 'true'); menu.setAttribute('aria-hidden', 'false'); }
      function closeMenu() { btn.classList.remove('is-open'); menu.classList.remove('is-open'); btn.setAttribute('aria-expanded', 'false'); menu.setAttribute('aria-hidden', 'true'); }
      btn.addEventListener('click', function () { btn.classList.contains('is-open') ? closeMenu() : openMenu(); });
      menu.querySelectorAll('a').forEach(function (link) { link.addEventListener('click', closeMenu); });
      document.addEventListener('click', function (e) {
        var nav = document.querySelector('nav');
        if (menu.classList.contains('is-open') && !nav.contains(e.target) && !menu.contains(e.target)) closeMenu();
      });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && menu.classList.contains('is-open')) { closeMenu(); btn.focus(); } });
    }());

    window.addEventListener('scroll', function () {
      document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 80);
    }, { passive: true });
  </script>
