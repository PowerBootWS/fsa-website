  - generic [ref=e212]:
    - generic [ref=e213]: Common Questions
    - heading "FAQ" [level=2] [ref=e214]
    - generic [ref=e215]:
      - generic [ref=e216]:
        - generic [ref=e217]: Do I need to study papers in order?
        - paragraph [ref=e218]: No. You have access to all six papers from day one and can study them in any sequence. Many learners start with their strongest subject to build momentum, then move to the heavier calculation papers.
      - generic [ref=e219]:
        - generic [ref=e220]: What if I need more than 12 months?
        - paragraph [ref=e221]: Just keep your subscription active. There are no penalties for taking longer. The 6–12 month window is a guideline based on typical working operators, not a hard deadline.
      - generic [ref=e222]:
        - generic [ref=e223]: How does the AI tutoring work?
        - paragraph [ref=e224]: When you're working through a problem or concept and get stuck, you can ask a question right in context. The AI explains why — not just what — and adapts follow-up questions to address the specific gap in your understanding.
      - generic [ref=e225]:
        - generic [ref=e226]: Can I pause my subscription?
        - paragraph [ref=e227]: Yes. Life on shift doesn't always allow for steady study time. You can cancel anytime and resubscribe when you're ready — your progress is saved.
      - generic [ref=e228]:
        - generic [ref=e229]: Is this aligned to SOPEEC exams?
        - paragraph [ref=e230]: Yes. Content is structured around 2nd Class exam objectives as set out by SOPEEC for interprovincial certification. The focus is on how problems are actually marked and what examiners are looking for in your solutions.
      - generic [ref=e231]:
        - generic [ref=e232]: I've been out of school for years. Will this work for me?
        - paragraph [ref=e233]: That's exactly who this is built for. The step-by-step approach and AI tutoring are specifically powerful for operators returning to technical study — no assumption of recent classroom experience.
