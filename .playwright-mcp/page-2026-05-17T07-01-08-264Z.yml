        - generic [ref=e115]:
          - generic [ref=e116]: When are payouts processed?
          - generic [ref=e117]: On the 15th of each month for the previous month's earnings. Commissions earned in April are paid on May 15th via Interac e-Transfer. A minimum $50 balance is required for a payout — amounts below that carry forward.
        - generic [ref=e118]:
          - generic [ref=e119]: What happens if a subscriber cancels?
          - generic [ref=e120]: Commissions are paid on successful subscription payments. If a subscriber cancels or receives a refund on a future payment, no commission is earned on that specific transaction.
