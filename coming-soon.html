  <script>
    (function () {
      var target = new Date('2026-04-29T08:00:00-06:00').getTime();

      function pad(n) {
        return n < 10 ? '0' + n : String(n);
      }

      function tick() {
        var now = Date.now();
        var diff = target - now;

        if (diff <= 0) {
          document.getElementById('countdown').style.display = 'none';
          document.getElementById('cd-live').style.display = '';
          return;
        }

        var totalSeconds = Math.floor(diff / 1000);
        var totalMinutes = Math.floor(totalSeconds / 60);
        var totalHours   = Math.floor(totalMinutes / 60);
        var days         = Math.floor(totalHours / 24);
        var hours        = totalHours % 24;
        var minutes      = totalMinutes % 60;
        var seconds      = totalSeconds % 60;

        document.getElementById('cd-days').textContent    = pad(days);
        document.getElementById('cd-hours').textContent   = pad(hours);
        document.getElementById('cd-minutes').textContent = pad(minutes);
        document.getElementById('cd-seconds').textContent = pad(seconds);
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>

  <script>
    (function () {
      var btn = document.getElementById('hamburger');
      var menu = document.getElementById('mobile-menu');
      if (!btn || !menu) return;

      function openMenu() {
        btn.classList.add('is-open');
        menu.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        menu.setAttribute('aria-hidden', 'false');
      }

      function closeMenu() {
        btn.classList.remove('is-open');
        menu.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        menu.setAttribute('aria-hidden', 'true');
      }

      btn.addEventListener('click', function () {
        btn.classList.contains('is-open') ? closeMenu() : openMenu();
      });

      menu.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });

      document.addEventListener('click', function (e) {
        var nav = document.querySelector('nav');
        if (menu.classList.contains('is-open') && !nav.contains(e.target) && !menu.contains(e.target)) {
          closeMenu();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && menu.classList.contains('is-open')) {
          closeMenu();
          btn.focus();
        }
      });
    }());
  </script>

  <script>
    (function () {
      var nav = document.querySelector('nav');
      window.addEventListener('scroll', function () {

      }, { passive: true });
    }());
