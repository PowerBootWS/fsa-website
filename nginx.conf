server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index home-v2.html;

    location = / {
        try_files /coming-soon.html =404;
    }

    location = /coming-soon {
        try_files /coming-soon.html =404;
    }

    location /articles/ {
        try_files $uri $uri/index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
