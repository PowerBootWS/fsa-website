server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location = / {
        try_files /index.html =404;
    }

    location /articles/ {
        try_files $uri $uri/index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
